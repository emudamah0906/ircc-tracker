name: IRCC scrapers

# Runs all IRCC data scrapers on a 6-hour schedule plus a manual trigger.
# Free on GitHub Actions for public repos.

on:
  schedule:
    # Every 6 hours: 00:15, 06:15, 12:15, 18:15 UTC
    # The :15 offset avoids load spikes that hit canada.ca on the hour.
    - cron: '15 */6 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: scraper
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Express Entry draws scraper
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python draws_scraper.py

      - name: Run processing times scraper
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scraper.py
        # No continue-on-error: a silently-failing scraper went 25 days
        # before anyone noticed last time. Fail loud, fix fast.

      - name: Fetch IRCC news (invokes Supabase Edge Function)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "Invoking fetch-ircc-news edge function..."
          status_and_body=$(curl -s -w "\nHTTP_STATUS:%{http_code}\n" \
            -X POST \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "${SUPABASE_URL}/functions/v1/fetch-ircc-news")
          echo "$status_and_body"
          # Fail the step if the HTTP status wasn't 2xx
          status=$(echo "$status_and_body" | grep -oE 'HTTP_STATUS:[0-9]+' | tail -1 | cut -d: -f2)
          if [ -z "$status" ] || [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "News fetch failed with status: $status"
            exit 1
          fi

      # Sanity check: confirm fresh rows actually landed in Supabase. If
      # any of the three scrapers above silently no-op'd (e.g. a wrong
      # parser, an expired key), the freshness check fails and the
      # workflow goes red instead of staying deceptively green.
      - name: Verify Supabase data freshness
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          set -e
          fail=0

          check_table() {
            local table="$1"
            local col="$2"
            local max_hours="$3"

            # Pull the newest row's timestamp
            ts=$(curl -s \
              -H "apikey: ${SUPABASE_SERVICE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
              "${SUPABASE_URL}/rest/v1/${table}?select=${col}&order=${col}.desc&limit=1" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0].get('${col}','') if d else '')")

            if [ -z "$ts" ]; then
              echo "::error::${table} returned no rows."
              fail=1
              return
            fi

            age_hours=$(python3 -c "
          from datetime import datetime, timezone
          ts = '${ts}'.replace('Z','+00:00')
          # date-only timestamps need a time component
          if 'T' not in ts:
              ts = ts + 'T00:00:00+00:00'
          age = (datetime.now(timezone.utc) - datetime.fromisoformat(ts)).total_seconds() / 3600
          print(f'{age:.1f}')
          ")
            echo "${table}.${col}: newest = ${ts} (${age_hours} h ago, max ${max_hours} h)"
            python3 -c "import sys; sys.exit(0 if float('${age_hours}') <= float('${max_hours}') else 1)" || {
              echo "::error::${table} is stale: newest row is ${age_hours} h old (max ${max_hours} h)."
              fail=1
            }
          }

          # Processing times: scraper runs each cron, must be fresh within ~12 h
          check_table "processing_times" "fetched_at" "12"
          # Draws: IRCC publishes ~weekly, allow a generous window
          check_table "pr_draws"          "draw_date"  "240"
          # News: usually a few items per week, allow ~1 week
          check_table "ircc_news"         "published_at" "168"

          if [ "$fail" = "1" ]; then
            echo "::error::One or more tables are stale. Check the steps above."
            exit 1
          fi
          echo "All tables fresh."
