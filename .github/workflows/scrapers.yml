name: IRCC scrapers

# Runs all IRCC data scrapers on a 6-hour schedule plus a manual trigger.
# Free on GitHub Actions for public repos.

on:
  schedule:
    # Every 6 hours: 00:15, 06:15, 12:15, 18:15 UTC
    # The :15 offset avoids load spikes that hit canada.ca on the hour.
    - cron: '15 */6 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: scraper
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Express Entry draws scraper
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python draws_scraper.py

      - name: Run processing times scraper
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scraper.py
        # No continue-on-error: a silently-failing scraper went 25 days
        # before anyone noticed last time. Fail loud, fix fast.

      - name: Run Ontario OINP scraper
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python oinp_scraper.py

      - name: Fetch IRCC news (invokes Supabase Edge Function)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          set -e
          echo "Invoking fetch-ircc-news edge function..."
          status_and_body=$(curl -s -w "\nHTTP_STATUS:%{http_code}\n" \
            -X POST \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "${SUPABASE_URL}/functions/v1/fetch-ircc-news")
          echo "$status_and_body"
          status=$(echo "$status_and_body" | grep -oE 'HTTP_STATUS:[0-9]+' | tail -1 | cut -d: -f2)
          ts=$(date -u +%FT%TZ)
          if [ -z "$status" ] || [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "::error::News fetch failed with status: $status"
            # Report failure to scraper_health so the IG worker sees it.
            curl -s -X POST \
              -H "apikey: ${SUPABASE_SERVICE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
              -H "Content-Type: application/json" \
              -H "Prefer: resolution=merge-duplicates,return=minimal" \
              -d "{\"scraper_name\":\"ircc_news\",\"last_attempt_at\":\"${ts}\",\"last_status\":\"failed\",\"last_error\":\"edge function HTTP ${status}\",\"last_run_id\":\"${GITHUB_RUN_ID}\",\"updated_at\":\"${ts}\"}" \
              "${SUPABASE_URL}/rest/v1/scraper_health?on_conflict=scraper_name" || true
            exit 1
          fi
          # Report success
          curl -s -X POST \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates,return=minimal" \
            -d "{\"scraper_name\":\"ircc_news\",\"last_attempt_at\":\"${ts}\",\"last_success_at\":\"${ts}\",\"last_status\":\"success\",\"last_error\":null,\"last_run_id\":\"${GITHUB_RUN_ID}\",\"updated_at\":\"${ts}\"}" \
            "${SUPABASE_URL}/rest/v1/scraper_health?on_conflict=scraper_name" || true

      # Catch-all: if any step above failed (including a Python crash
      # that happened BEFORE the per-scraper health.report_failure call
      # could fire — e.g. import error, missing env), record a workflow-level
      # failure so the IG worker is aware that this run did not complete.
      - name: Report workflow-level failure
        if: failure()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          ts=$(date -u +%FT%TZ)
          curl -s -X POST \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates,return=minimal" \
            -d "{\"scraper_name\":\"workflow\",\"last_attempt_at\":\"${ts}\",\"last_status\":\"failed\",\"last_error\":\"GH Actions run ${GITHUB_RUN_ID} failed — see logs\",\"last_run_id\":\"${GITHUB_RUN_ID}\",\"updated_at\":\"${ts}\"}" \
            "${SUPABASE_URL}/rest/v1/scraper_health?on_conflict=scraper_name" || true

      - name: Report workflow-level success
        if: success()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          ts=$(date -u +%FT%TZ)
          curl -s -X POST \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates,return=minimal" \
            -d "{\"scraper_name\":\"workflow\",\"last_attempt_at\":\"${ts}\",\"last_success_at\":\"${ts}\",\"last_status\":\"success\",\"last_error\":null,\"last_run_id\":\"${GITHUB_RUN_ID}\",\"updated_at\":\"${ts}\"}" \
            "${SUPABASE_URL}/rest/v1/scraper_health?on_conflict=scraper_name" || true

      # Sanity check on processing_times only.
      #
      # The scraper writes new processing_times rows with the current time on
      # every successful run, so a stale fetched_at unambiguously means the
      # scraper isn't working. pr_draws and ircc_news only get new rows when
      # IRCC actually publishes something — checking their freshness would
      # confuse "scraper broken" with "IRCC quiet this week".
      #
      # If the draws or news scrapers silently break, we'll catch it through
      # the steps above (now that continue-on-error is removed) — they exit
      # non-zero on real errors.
      - name: Verify processing_times freshness
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          set -e
          ts=$(curl -s \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            "${SUPABASE_URL}/rest/v1/processing_times?select=fetched_at&order=fetched_at.desc&limit=1" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['fetched_at'] if d else '')")

          if [ -z "$ts" ]; then
            echo "::error::processing_times returned no rows."
            exit 1
          fi

          age_hours=$(python3 -c "
          from datetime import datetime, timezone
          ts = '${ts}'.replace('Z','+00:00')
          age = (datetime.now(timezone.utc) - datetime.fromisoformat(ts)).total_seconds() / 3600
          print(f'{age:.1f}')
          ")
          echo "processing_times newest fetched_at: ${ts} (${age_hours} h ago)"

          python3 -c "import sys; sys.exit(0 if float('${age_hours}') <= 24 else 1)" || {
            echo "::error::processing_times is stale: newest row is ${age_hours} h old (expected ≤ 24 h)."
            exit 1
          }
          echo "processing_times is fresh."
