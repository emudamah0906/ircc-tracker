name: IRCC scrapers

# Runs all IRCC data scrapers on a 6-hour schedule plus a manual trigger.
# Free on GitHub Actions for public repos.

on:
  schedule:
    # Every 6 hours: 00:15, 06:15, 12:15, 18:15 UTC
    # The :15 offset avoids load spikes that hit canada.ca on the hour.
    - cron: '15 */6 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: scraper
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Express Entry draws scraper
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python draws_scraper.py

      - name: Run processing times scraper
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scraper.py
        # Don't fail the whole workflow if one scraper hiccups.
        continue-on-error: true
